name: Integration Tests

# Live API integration tests for ZTF/ATLAS/MPC endpoints.
#
# POLICY: Credentials are kept off GitHub by operator decision (2026-06-21).
# This workflow always skips the live test step. It exists as a reference
# so the CI tab shows a clear skip notice rather than a missing job.
#
# To run integration tests, use the local Mac command:
#   source Skills/verify_live_credentials.sh
#   PYTHONPATH=src uv run python -m pytest -m integration_live -v --timeout=120
#
# Tests covered: all @pytest.mark.integration_live tests in tests/
# Primary file: tests/test_fetch.py (ZTF IRSA, ATLAS, MPC, Horizons)

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  integration-live:
    name: Integration tests (live APIs — local Mac only)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv with Python 3.14
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Install dependencies (from uv.lock)
        run: uv sync --extra dev

      # Credentials are kept off GitHub by operator policy.
      # This step always emits a skip notice; live tests run on the operator Mac.
      - name: Skip notice (credentials kept off GitHub by policy)
        run: |
          echo "::notice title=Integration tests skipped::Credentials are kept off GitHub by operator policy. Run locally: source Skills/verify_live_credentials.sh && PYTHONPATH=src uv run python -m pytest -m integration_live -v --timeout=120"
