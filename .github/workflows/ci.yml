name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Python 3.14.3 matches the project venv (.venv) on the operator Mac.
        # uv manages the venv from uv.lock so CI uses identical pinned deps.
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      # Install uv — used to sync the venv from uv.lock, matching the local .venv exactly.
      - name: Set up uv with Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Sync all dev dependencies from the lockfile — no loose pip installs.
      - name: Install dependencies (from uv.lock)
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: |
          uv run python -m mypy src \
            --ignore-missing-imports \
            --no-strict-optional \
            --disable-error-code=no-any-return \
            --disable-error-code=type-arg \
            --disable-error-code=misc \
            --disable-error-code=unused-ignore

      - name: Test
        run: |
          uv run python -m pytest \
            -m "not integration_live" \
            -q \
            --cov=src \
            --cov-fail-under=100
        env:
          PYTHONPATH: src
