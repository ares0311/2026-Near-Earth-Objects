sandbox_mode = "workspace-write"

[shell_environment_policy]
set = { UV_CACHE_DIR = ".uv-cache" }

[mcp_servers.neo_project_files]
command = ".venv/bin/python"
args = ["Skills/neo_mcp_server.py", "--server", "project_files"]
env = { NEO_MCP_OFFLINE_DEFAULT = "1" }

[mcp_servers.neo_project_files.tools.read_project_file]
approval_mode = "approve"

[mcp_servers.neo_git_read]
command = ".venv/bin/python"
args = ["Skills/neo_mcp_server.py", "--server", "git_read"]
env = { NEO_MCP_OFFLINE_DEFAULT = "1" }

[mcp_servers.neo_git_read.tools.git_read]
approval_mode = "approve"

[mcp_servers.neo_guard]
command = ".venv/bin/python"
args = ["Skills/neo_mcp_server.py", "--server", "neo_guard"]
env = { NEO_MCP_OFFLINE_DEFAULT = "1" }

[mcp_servers.neo_guard.tools.run_guard_command]
approval_mode = "approve"
